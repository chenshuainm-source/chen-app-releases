<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07101d">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>陳</title>
  <style>
    :root{color-scheme:dark;--bg:#07101d;--card:#0d1b2c;--line:#23354e;--text:#eaf1fb;--muted:#91a2b9;--cyan:#41d8c9;--red:#ff6f78}
    *{box-sizing:border-box}html,body,#dashboard{width:100%;height:100%;margin:0}body{overflow:hidden;background:var(--bg);color:var(--text);font:15px/1.55 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    #dashboard{border:0;background:var(--bg)}#status{position:fixed;inset:0;z-index:2;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 80% 0,#12334a 0,transparent 36%),var(--bg)}
    .card{width:min(440px,100%);padding:24px;border:1px solid var(--line);border-radius:22px;background:rgba(13,27,44,.96);box-shadow:0 24px 80px rgba(0,0,0,.3)}
    .eyebrow{font-size:11px;letter-spacing:.16em;color:var(--cyan);font-weight:800}.brand{font-size:32px;font-weight:900;margin:6px 0}.message{color:var(--muted);white-space:pre-line}.error{color:var(--red)}button{width:100%;margin-top:16px;padding:13px;border:0;border-radius:12px;background:var(--cyan);color:#07101d;font-weight:800;font-size:15px}
    .hidden{display:none!important}
  </style>
</head>
<body>
  <iframe id="dashboard" title="陳控制台" class="hidden" allow="clipboard-read; clipboard-write"></iframe>
  <div id="status"><div class="card"><div class="eyebrow">SELF-HEALING MOBILE ENTRY</div><div class="brand">陳</div><div id="message" class="message">正在寻找这台电脑的最新安全入口…</div><button id="retry" class="hidden" type="button">重新连接</button></div></div>
  <script>
    const endpointUrl='./endpoint.json';
    const status=document.getElementById('status');
    const message=document.getElementById('message');
    const retry=document.getElementById('retry');
    const dashboard=document.getElementById('dashboard');
    const fragment=new URLSearchParams(location.hash.replace(/^#/,''));
    const supplied=fragment.get('access');
    if(supplied&&supplied.length>=24)localStorage.setItem('chen_access',supplied);
    const token=supplied||localStorage.getItem('chen_access')||'';
    if(supplied)history.replaceState(null,'',location.pathname);
    let currentOrigin='';
    async function discover(){
      if(!token){message.innerHTML='<span class="error">设备尚未配对。</span>\n请从电脑端“安装手机客户端”重新复制固定入口。';retry.classList.add('hidden');return}
      try{
        const response=await fetch(`${endpointUrl}?t=${Date.now()}`,{cache:'no-store'});
        if(!response.ok)throw new Error(`HTTP ${response.status}`);
        const endpoint=await response.json();
        const origin=String(endpoint.origin||'').replace(/\/$/,'');
        if(!/^https:\/\/[a-z0-9-]+\.trycloudflare\.com$/i.test(origin))throw new Error('入口数据无效');
        if(origin!==currentOrigin){
          currentOrigin=origin;
          message.textContent='已找到最新入口，正在连接电脑…';
          dashboard.src=`${origin}/?access=${encodeURIComponent(token)}`;
        }
        dashboard.classList.remove('hidden');status.classList.add('hidden');retry.classList.add('hidden');
      }catch(error){
        dashboard.classList.add('hidden');status.classList.remove('hidden');retry.classList.remove('hidden');
        message.innerHTML=`<span class="error">固定入口暂时无法读取。</span>\n电脑端会自动修复，无需重新安装。\n${String(error.message||error)}`;
      }
    }
    retry.onclick=discover;
    dashboard.addEventListener('load',()=>{status.classList.add('hidden');dashboard.classList.remove('hidden')});
    discover();setInterval(discover,30000);
  </script>
</body>
</html>
