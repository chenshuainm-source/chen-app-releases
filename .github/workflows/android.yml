name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to rebuild or repair"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version && format('refs/tags/v{0}', inputs.version) || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Build Android APK
        run: gradle --no-daemon assembleDebug
      - name: Prepare download file
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          FILE="chen-android-v${VERSION}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$FILE"
          cp "$FILE" chen-android-latest.apk
          sha256sum "$FILE" > "chen-v${VERSION}-SHA256.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: chen-android
          path: |
            chen-android-*.apk
            chen-*-SHA256.txt
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -n "${{ inputs.version }}" ]; then TAG="v${{ inputs.version }}"; fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" chen-android-*.apk chen-*-SHA256.txt --clobber
            gh release edit "$TAG" --latest --prerelease=false
          else
            gh release create "$TAG" chen-android-*.apk chen-*-SHA256.txt --generate-notes --latest --title "陳 Android ${TAG}"
          fi
