plugins {
    id "com.android.application"
}

android {
    namespace "com.videoflow.control"
    compileSdk 34

    defaultConfig {
        applicationId "com.videoflow.control"
        minSdk 23
        targetSdk 34
        versionCode 9
        versionName "3.0.2"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}
